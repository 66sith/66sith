<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="Sam — sovereign multi-node local AI cluster">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04070d"/>
      <stop offset="50%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="50%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="sig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#39d353" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39d353" stop-opacity="1"/>
      <stop offset="100%" stop-color="#39d353" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sig2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39d353"/>
      <stop offset="45%" stop-color="#26a641"/>
      <stop offset="100%" stop-color="#0e4429" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodecore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="50%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#0e4429" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
    <pattern id="grid2" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="#21262d" stroke-width="1.2"/>
    </pattern>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#grid)"/>
  <rect width="1280" height="440" fill="url(#grid2)"/>

  <g stroke="#39d353" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 20 20 L 20 60 M 20 20 L 60 20"/>
    <path d="M 1260 20 L 1260 60 M 1260 20 L 1220 20"/>
    <path d="M 20 420 L 20 380 M 20 420 L 60 420"/>
    <path d="M 1260 420 L 1260 380 M 1260 420 L 1220 420"/>
  </g>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#39d353" opacity="0.55">
    <text x="40" y="40">● SAM.CLUSTER.LOCAL</text>
    <text x="1240" y="40" text-anchor="end">UPTIME: ∞  ·  STATUS: ONLINE</text>
    <text x="40" y="415">LAT: 0.00ms  ·  THR: ∞ t/s</text>
    <text x="1240" y="415" text-anchor="end">OP: 66sith  ·  NODES: 5/5</text>
  </g>

  <g fill="#39d353" opacity="0.4">
    <circle cx="120" cy="80" r="1.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="60" r="1"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="100" r="1.2"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1180" cy="70" r="1"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="370" r="1"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="360" r="1.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="200" r="0.8"><animate attributeName="opacity" values="0;0.4;0" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="1200" cy="200" r="0.8"><animate attributeName="opacity" values="0;0.4;0" dur="6.3s" repeatCount="indefinite"/></circle>
  </g>

  <g stroke="#26a641" stroke-width="1.2" opacity="0.4" fill="none">
    <line x1="640" y1="240" x2="280" y2="150"/>
    <line x1="640" y1="240" x2="280" y2="330"/>
    <line x1="640" y1="240" x2="1000" y2="150"/>
    <line x1="640" y1="240" x2="1000" y2="330"/>
    <line x1="280" y1="150" x2="1000" y2="150"/>
    <line x1="280" y1="330" x2="1000" y2="330"/>
    <line x1="280" y1="150" x2="280" y2="330"/>
    <line x1="1000" y1="150" x2="1000" y2="330"/>
    <line x1="280" y1="150" x2="1000" y2="330"/>
    <line x1="280" y1="330" x2="1000" y2="150"/>
  </g>

  <g stroke-width="2.5" fill="none" opacity="0.9">
    <line x1="280" y1="150" x2="640" y2="240" stroke="url(#sig)">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="240" x2="1000" y2="330" stroke="url(#sig2)">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
    </line>
    <line x1="280" y1="330" x2="640" y2="240" stroke="url(#sig2)">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="240" x2="1000" y2="150" stroke="url(#sig)">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="2.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <g fill="#00ffa3">
    <circle r="3">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 280 150 L 640 240"/>
    </circle>
    <circle r="3">
      <animateMotion dur="4s" begin="1s" repeatCount="indefinite" path="M 640 240 L 1000 150"/>
    </circle>
    <circle r="3">
      <animateMotion dur="4s" begin="2s" repeatCount="indefinite" path="M 1000 330 L 640 240"/>
    </circle>
    <circle r="3">
      <animateMotion dur="4s" begin="3s" repeatCount="indefinite" path="M 640 240 L 280 330"/>
    </circle>
  </g>

  <g filter="url(#glow)">
    <circle cx="280" cy="150" r="16" fill="url(#node)"/>
    <circle cx="280" cy="150" r="16" fill="none" stroke="#39d353" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="16;28;16" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="330" r="16" fill="url(#node)"/>
    <circle cx="280" cy="330" r="16" fill="none" stroke="#39d353" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="16;28;16" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="150" r="16" fill="url(#node)"/>
    <circle cx="1000" cy="150" r="16" fill="none" stroke="#39d353" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="16;28;16" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="330" r="16" fill="url(#node)"/>
    <circle cx="1000" cy="330" r="16" fill="none" stroke="#39d353" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="16;28;16" dur="4s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g filter="url(#glowStrong)">
    <circle cx="640" cy="240" r="34" fill="url(#nodecore)"/>
    <circle cx="640" cy="240" r="34" fill="none" stroke="#00ffa3" stroke-width="2" opacity="0.7">
      <animate attributeName="r" values="34;58;34" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="240" r="34" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="34;72;34" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#7d8590">
    <text x="280" y="122" text-anchor="middle">node-01 · infer</text>
    <text x="280" y="362" text-anchor="middle">node-02 · infer</text>
    <text x="1000" y="122" text-anchor="middle">node-03 · infer</text>
    <text x="1000" y="362" text-anchor="middle">node-04 · worker</text>
    <text x="640" y="298" text-anchor="middle" fill="#00ffa3" font-weight="bold">orchestrator</text>
  </g>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" fill="#e6edf3">
    <text x="640" y="100" font-size="11" font-weight="400" text-anchor="middle" fill="#7d8590" letter-spacing="6">
      SOVEREIGN · LOCAL · MULTI-NODE · AGENT-DRIVEN
    </text>
    <text x="640" y="190" font-size="72" font-weight="800" text-anchor="middle" letter-spacing="14" fill="url(#accent)" filter="url(#glow)">
      SAM
    </text>
  </g>
</svg>
