<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-label="Sam terminal boot sequence">
  <defs>
    <linearGradient id="termbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <filter id="termGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" rx="10" fill="url(#termbg)" stroke="#30363d" stroke-width="1"/>
  <!-- title bar -->
  <rect width="900" height="28" rx="10" fill="#161b22"/>
  <rect y="18" width="900" height="10" fill="#161b22"/>
  <g>
    <circle cx="18" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="14" r="5" fill="#febc2e"/>
    <circle cx="54" cy="14" r="5" fill="#28c940"/>
  </g>
  <text x="450" y="18" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="11" fill="#7d8590">al@sam.local — /cluster/boot</text>

  <!-- Terminal content -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="13" fill="#39d353" filter="url(#termGlow)">
    <text x="20" y="60">
      <tspan opacity="0">$ sam boot --all-nodes</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.3s" fill="freeze"/>
    </text>
    <text x="20" y="82" fill="#7d8590">
      <tspan opacity="0">[  0.00s] init sovereign cluster ....................... </tspan><tspan fill="#39d353" opacity="0">OK</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.9s" fill="freeze"/>
    </text>
    <text x="20" y="102" fill="#7d8590">
      <tspan opacity="0">[  0.12s] node-01  llama.cpp  gguf-q8  .......... </tspan><tspan fill="#39d353" opacity="0">ONLINE</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.4s" fill="freeze"/>
    </text>
    <text x="20" y="122" fill="#7d8590">
      <tspan opacity="0">[  0.18s] node-02  llama.cpp  gguf-q6  .......... </tspan><tspan fill="#39d353" opacity="0">ONLINE</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze"/>
    </text>
    <text x="20" y="142" fill="#7d8590">
      <tspan opacity="0">[  0.23s] node-03  llama.cpp  gguf-q8  .......... </tspan><tspan fill="#39d353" opacity="0">ONLINE</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.2s" fill="freeze"/>
    </text>
    <text x="20" y="162" fill="#7d8590">
      <tspan opacity="0">[  0.29s] node-04  worker  flux/trading  ......... </tspan><tspan fill="#39d353" opacity="0">ONLINE</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="2.6s" fill="freeze"/>
    </text>
    <text x="20" y="182" fill="#7d8590">
      <tspan opacity="0">[  0.35s] orchestrator  nemotron-8b  .............. </tspan><tspan fill="#39d353" opacity="0">READY</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.0s" fill="freeze"/>
    </text>
    <text x="20" y="202" fill="#7d8590">
      <tspan opacity="0">[  0.38s] persona "Sam"  wake-word active  .......... </tspan><tspan fill="#39d353" opacity="0">LIVE</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.4s" fill="freeze"/>
    </text>
    <text x="20" y="224" fill="#00ffa3">
      <tspan opacity="0">sam » ready. how can i help, Al?</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="3.9s" fill="freeze"/>
    </text>
    <!-- Blinking cursor -->
    <rect x="310" y="213" width="8" height="14" fill="#00ffa3">
      <animate attributeName="opacity" values="0;0;1;1" dur="1s" begin="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
