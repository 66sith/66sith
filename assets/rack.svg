<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420" role="img" aria-label="Sam server rack">
  <defs>
    <linearGradient id="rackBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="rackFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="unit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="led" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="600" height="420" fill="url(#rackBg)"/>

  <!-- Rack frame -->
  <rect x="100" y="30" width="400" height="370" rx="4" fill="url(#rackFront)" stroke="#30363d" stroke-width="2"/>
  <rect x="100" y="30" width="400" height="12" fill="#161b22"/>
  <rect x="100" y="388" width="400" height="12" fill="#161b22"/>
  <!-- rack mounting holes -->
  <g fill="#0d1117">
    <circle cx="112" cy="36" r="1.5"/><circle cx="488" cy="36" r="1.5"/>
    <circle cx="112" cy="394" r="1.5"/><circle cx="488" cy="394" r="1.5"/>
  </g>

  <!-- U labels -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#484f58">
    <text x="92" y="62" text-anchor="end">1U</text>
    <text x="92" y="102" text-anchor="end">2U</text>
    <text x="92" y="142" text-anchor="end">3U</text>
    <text x="92" y="182" text-anchor="end">4U</text>
    <text x="92" y="222" text-anchor="end">5U</text>
    <text x="92" y="262" text-anchor="end">6U</text>
    <text x="92" y="302" text-anchor="end">7U</text>
    <text x="92" y="342" text-anchor="end">8U</text>
    <text x="92" y="382" text-anchor="end">9U</text>
  </g>

  <!-- Unit 1 - Orchestrator -->
  <g>
    <rect x="110" y="50" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="64" r="2" fill="#00ffa3" filter="url(#led)"/>
    <circle cx="122" cy="64" r="2" fill="#00ffa3">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="131" cy="64" r="2" fill="#39d353"/>
    <text x="145" y="68" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">orchestrator · nemotron-8b</text>
    <g font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">
      <text x="470" y="68" text-anchor="end">READY</text>
    </g>
  </g>

  <!-- Unit 2 - Node 01 -->
  <g>
    <rect x="110" y="90" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="104" r="2" fill="#39d353">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="131" cy="104" r="2" fill="#39d353"/>
    <text x="145" y="108" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">node-01 · llama.cpp · q8</text>
    <text x="470" y="108" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">ONLINE</text>
  </g>

  <!-- Unit 3 - Node 02 -->
  <g>
    <rect x="110" y="130" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="144" r="2" fill="#39d353">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="131" cy="144" r="2" fill="#39d353"/>
    <text x="145" y="148" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">node-02 · llama.cpp · q6</text>
    <text x="470" y="148" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">ONLINE</text>
  </g>

  <!-- Unit 4 - Node 03 -->
  <g>
    <rect x="110" y="170" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="184" r="2" fill="#39d353">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="131" cy="184" r="2" fill="#39d353"/>
    <text x="145" y="188" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">node-03 · llama.cpp · q8</text>
    <text x="470" y="188" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">ONLINE</text>
  </g>

  <!-- Unit 5 - Node 04 Worker -->
  <g>
    <rect x="110" y="210" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="224" r="2" fill="#00d4ff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="131" cy="224" r="2" fill="#39d353"/>
    <text x="145" y="228" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">node-04 · worker · flux · trading</text>
    <text x="470" y="228" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">ONLINE</text>
  </g>

  <!-- Unit 6 - Storage -->
  <g>
    <rect x="110" y="250" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="264" r="2" fill="#39d353"/>
    <circle cx="131" cy="264" r="2" fill="#39d353">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <text x="145" y="268" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">cognitive-memory · vector store</text>
    <text x="470" y="268" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">READY</text>
  </g>

  <!-- Unit 7 - Network -->
  <g>
    <rect x="110" y="290" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <g>
      <rect x="118" y="298" width="10" height="12" fill="#0d1117" stroke="#30363d"/>
      <rect x="130" y="298" width="10" height="12" fill="#0d1117" stroke="#30363d"/>
      <rect x="142" y="298" width="10" height="12" fill="#0d1117" stroke="#30363d"/>
      <rect x="154" y="298" width="10" height="12" fill="#0d1117" stroke="#30363d"/>
      <circle cx="123" cy="304" r="0.8" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="135" cy="304" r="0.8" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="147" cy="304" r="0.8" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="159" cy="304" r="0.8" fill="#39d353"><animate attributeName="opacity" values="0;1;0" dur="0.3s" repeatCount="indefinite"/></circle>
    </g>
    <text x="180" y="308" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">nervous-system · 10GbE fabric</text>
    <text x="470" y="308" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">LINK</text>
  </g>

  <!-- Unit 8 - Voice -->
  <g>
    <rect x="110" y="330" width="380" height="28" fill="url(#unit)" stroke="#30363d"/>
    <circle cx="122" cy="344" r="2" fill="#00ffa3">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="145" y="348" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="10" fill="#e6edf3">voice-ops · wake · tts/stt</text>
    <text x="470" y="348" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="8" fill="#7d8590">LISTENING</text>
  </g>

  <!-- Unit 9 - PDU -->
  <g>
    <rect x="110" y="370" width="380" height="14" fill="#0d1117" stroke="#30363d"/>
    <g fill="#30363d">
      <rect x="120" y="374" width="5" height="6"/>
      <rect x="130" y="374" width="5" height="6"/>
      <rect x="140" y="374" width="5" height="6"/>
      <rect x="150" y="374" width="5" height="6"/>
      <rect x="160" y="374" width="5" height="6"/>
      <rect x="170" y="374" width="5" height="6"/>
      <rect x="180" y="374" width="5" height="6"/>
      <rect x="190" y="374" width="5" height="6"/>
    </g>
    <text x="470" y="381" text-anchor="end" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="7" fill="#484f58">PDU</text>
  </g>

  <!-- Rack label -->
  <text x="300" y="22" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,monospace" font-size="11" fill="#7d8590">sam.cluster · rack-01 · on-prem</text>
</svg>
