<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="Sam voice waveform">
  <defs>
    <linearGradient id="wbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffa3"/>
      <stop offset="50%" stop-color="#39d353"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="wglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="120" fill="#010409"/>

  <!-- center line -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#21262d" stroke-width="1"/>

